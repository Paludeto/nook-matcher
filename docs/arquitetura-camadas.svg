  <text x="360" y="78" text-anchor="middle" font-size="12" fill="#0a4730">cli.py — leitura de argumentos e orquestração de I/O</text>

  <!-- seta -->
  <polygon points="353,100 367,100 367,112 375,112 360,126 345,112 353,112" fill="#2f8f63"/>

