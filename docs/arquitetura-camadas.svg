<svg viewBox="0 0 760 600" xmlns="http://www.w3.org/2000/svg" width="760" height="600" font-family="Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2f8f63"/>
    </marker>
  </defs>

  <!-- aneis (containment) -->
  <rect x="20"  y="20"  width="720" height="560" rx="18" fill="#eafaf1" stroke="#74e0aa" stroke-width="1.5"/>
  <rect x="140" y="150" width="480" height="300" rx="16" fill="#cdf0de" stroke="#74e0aa" stroke-width="1.5"/>
  <rect x="250" y="250" width="260" height="160" rx="14" fill="#74e0aa" stroke="#2f8f63" stroke-width="1.5"/>

  <!-- rotulos de camada -->
  <text x="38"  y="46"  font-size="13" font-weight="700" fill="#2f8f63">Apresentação + Infraestrutura</text>
  <text x="156" y="176" font-size="13" font-weight="700" fill="#2f8f63">Aplicação</text>
  <text x="380" y="274" font-size="14" font-weight="700" fill="#06301f" text-anchor="middle">Domínio</text>
  <text x="38"  y="478" font-size="11" font-weight="700" fill="#2f8f63">Infraestrutura</text>

  <!-- componentes externos -->
  <g fill="#74e0aa" stroke="#2f8f63" stroke-width="1.5">
    <rect x="300" y="80"  width="160" height="40" rx="8"/>
    <rect x="260" y="190" width="240" height="40" rx="8"/>
    <rect x="38"  y="510" width="160" height="40" rx="8"/>
    <rect x="213" y="510" width="160" height="40" rx="8"/>
    <rect x="388" y="510" width="160" height="40" rx="8"/>
    <rect x="563" y="510" width="160" height="40" rx="8"/>
  </g>
  <g fill="#06301f" text-anchor="middle" font-weight="600">
    <text x="380" y="105" font-size="12">cli.py</text>
    <text x="380" y="215" font-size="11.5">BatchRecommendationService</text>
    <text x="118" y="535" font-size="10.5">CsvVillagerRepository</text>
    <text x="293" y="535" font-size="10.5">CsvPlayerProfileReader</text>
    <text x="468" y="535" font-size="10.5">CsvRecommendationWriter</text>
    <text x="643" y="535" font-size="10.5">config</text>
  </g>

  <!-- componentes do nucleo -->
  <g fill="#eafaf1" stroke="#2f8f63" stroke-width="1.2">
    <rect x="258" y="288" width="118" height="34" rx="7"/>
    <rect x="384" y="288" width="118" height="34" rx="7"/>
    <rect x="258" y="334" width="118" height="34" rx="7"/>
    <rect x="384" y="334" width="118" height="34" rx="7"/>
  </g>
  <g fill="#06301f" text-anchor="middle" font-weight="600" font-size="10">
    <text x="317" y="309">KNNRecommender</text>
    <text x="443" y="309">SimilarityStrategy</text>
    <text x="317" y="355">ExplanationBuilder</text>
    <text x="443" y="355">models</text>
  </g>

  <!-- setas: dependencias apontam para dentro (nucleo) -->
  <g stroke="#2f8f63" stroke-width="2" fill="none">
    <line x1="380" y1="234" x2="380" y2="251" marker-end="url(#arr)"/>
    <line x1="380" y1="426" x2="380" y2="409" marker-end="url(#arr)"/>
    <line x1="234" y1="330" x2="251" y2="330" marker-end="url(#arr)"/>
    <line x1="526" y1="330" x2="509" y2="330" marker-end="url(#arr)"/>
  </g>
  <text x="380" y="566" font-size="11" fill="#2f8f63" text-anchor="middle" font-style="italic">As setas (dependências) apontam sempre para dentro, em direção ao Domínio.</text>
</svg>
